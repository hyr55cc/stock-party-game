<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تسجيل الدخول — BIG MARGIN</title>
<link rel="icon" href="/favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/supabase-config.js"></script>
<style>
  :root{
    --bg:#0b0f14; --surface:#111827; --surface2:#1f2937; --border:#2b3750;
    --text:#e5e7eb; --text-dim:#9aa1ae; --red:#ff5252;
    --gold:#d4af37; --gold-bright:#e8c564; --gold-dim:#d4af3722;
  }
  *{ box-sizing:border-box; }
  .hidden{ display:none !important; }
  body{ margin:0; font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .wrap{ max-width:400px; margin:0 auto; padding:8vh 20px; text-align:center; }
  .wrap img{ height:70px; margin-bottom:24px; }
  h1{ font-family:'Playfair Display',serif; font-size:1.5em; margin:0 0 24px; }
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:26px; text-align:right; }
  .tabs{ display:flex; gap:8px; background:var(--surface2); border-radius:12px; padding:4px; margin-bottom:20px; }
  .tabs button{ flex:1; padding:10px; border-radius:9px; border:none; background:transparent; color:var(--text-dim); font-weight:700; font-family:inherit; cursor:pointer; }
  .tabs button.active{ background:var(--gold); color:#1a1200; }
  label{ display:block; font-size:.85em; color:var(--text-dim); margin:14px 0 6px; }
  input{ width:100%; padding:13px; border-radius:12px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:1em; font-family:inherit; }
  input:focus{ outline:none; border-color:var(--gold); }
  button.primary{
    width:100%; margin-top:22px; padding:14px; border-radius:12px; border:none;
    background:linear-gradient(135deg, var(--gold-bright), var(--gold)); color:#1a1200; font-weight:800; font-size:1.05em; cursor:pointer;
  }
  button.primary:disabled{ opacity:.5; cursor:not-allowed; }
  #msg{ margin-top:14px; font-size:.9em; min-height:20px; }
  #msg.err{ color:var(--red); }
  #msg.ok{ color:var(--gold-bright); }
  .back{ display:inline-block; margin-top:20px; color:var(--text-dim); text-decoration:none; font-size:.9em; }
</style>
</head>
<body>
<div class="wrap">
  <img src="/logo.png" alt="BIG MARGIN" />
  <h1>ادخل إلى حسابك</h1>
  <div class="card">
    <div class="tabs">
      <button id="tabLogin" class="active">تسجيل الدخول</button>
      <button id="tabSignup">إنشاء حساب</button>
    </div>
    <div id="usernameRow" class="hidden">
      <label>اسم المستخدم (يظهر بالمتصدرين)</label>
      <input id="username" maxlength="16" placeholder="مثلاً: أحمد" />
    </div>
    <label>البريد الإلكتروني</label>
    <input id="email" type="email" placeholder="you@example.com" />
    <label>كلمة المرور</label>
    <input id="password" type="password" placeholder="6 أحرف على الأقل" />
    <button class="primary" id="submitBtn">تسجيل الدخول</button>
    <div id="msg"></div>
  </div>
  <a class="back" href="/">← رجوع للرئيسية</a>
</div>
<script>
if (!supabaseClient) {
  document.getElementById('msg').textContent = 'نظام تسجيل الدخول غير مُفعّل بعد على هذا الموقع.';
  document.getElementById('msg').className = 'err';
  document.getElementById('submitBtn').disabled = true;
}

let mode = 'login';
const tabLogin = document.getElementById('tabLogin');
const tabSignup = document.getElementById('tabSignup');
const usernameRow = document.getElementById('usernameRow');
const submitBtn = document.getElementById('submitBtn');
const msg = document.getElementById('msg');

tabLogin.addEventListener('click', () => setMode('login'));
tabSignup.addEventListener('click', () => setMode('signup'));
function setMode(m){
  mode = m;
  tabLogin.classList.toggle('active', m === 'login');
  tabSignup.classList.toggle('active', m === 'signup');
  usernameRow.classList.toggle('hidden', m === 'login');
  submitBtn.textContent = m === 'login' ? 'تسجيل الدخول' : 'إنشاء حساب';
  msg.textContent = ''; msg.className = '';
}

const params = new URLSearchParams(location.search);
const redirectTo = params.get('redirect') || '/';

submitBtn.addEventListener('click', async () => {
  if (!supabaseClient) return;
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showMsg('عبّي البريد وكلمة المرور', true); return; }
  submitBtn.disabled = true;
  try {
    if (mode === 'login') {
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) throw error;
      showMsg('تم تسجيل الدخول! جاري التحويل...', false);
      setTimeout(() => location.href = redirectTo, 700);
    } else {
      const username = document.getElementById('username').value.trim();
      if (!username) { showMsg('اختر اسم مستخدم', true); submitBtn.disabled = false; return; }
      const { data, error } = await supabaseClient.auth.signUp({ email, password });
      if (error) throw error;
      if (data.user) {
        await supabaseClient.from('profiles').insert({ id: data.user.id, username });
      }
      if (data.session) {
        showMsg('تم إنشاء الحساب! جاري التحويل...', false);
        setTimeout(() => location.href = redirectTo, 700);
      } else {
        showMsg('تم إنشاء الحساب! تحقق من بريدك الإلكتروني لتأكيد الحساب قبل الدخول.', false);
      }
    }
  } catch (e) {
    showMsg(e.message || 'حدث خطأ، حاول مرة أخرى', true);
  }
  submitBtn.disabled = false;
});

function showMsg(text, isErr){
  msg.textContent = text;
  msg.className = isErr ? 'err' : 'ok';
}
</script>
</body>
</html>
